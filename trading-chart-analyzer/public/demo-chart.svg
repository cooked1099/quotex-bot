<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#1a1a2e"/>
  
  <!-- Grid lines -->
  <g stroke="#2a2a3e" stroke-width="1">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  
  <!-- Price chart line -->
  <polyline 
    points="50,300 100,280 150,260 200,240 250,220 300,200 350,180 400,160 450,140 500,120 550,100 600,80 650,60 700,40 750,20" 
    fill="none" 
    stroke="#00ff88" 
    stroke-width="3"
  />
  
  <!-- Candlesticks -->
  <g stroke="#ffffff" stroke-width="2">
    <!-- Bullish candles -->
    <line x1="100" y1="280" x2="100" y2="290"/>
    <rect x="95" y="285" width="10" height="10" fill="#00ff88"/>
    <line x1="100" y1="285" x2="100" y2="295"/>
    
    <line x1="200" y1="240" x2="200" y2="250"/>
    <rect x="195" y="245" width="10" height="10" fill="#00ff88"/>
    <line x1="200" y1="245" x2="200" y2="255"/>
    
    <line x1="300" y1="200" x2="300" y2="210"/>
    <rect x="295" y="205" width="10" height="10" fill="#00ff88"/>
    <line x1="300" y1="205" x2="300" y2="215"/>
    
    <line x1="400" y1="160" x2="400" y2="170"/>
    <rect x="395" y="165" width="10" height="10" fill="#00ff88"/>
    <line x1="400" y1="165" x2="400" y2="175"/>
    
    <line x1="500" y1="120" x2="500" y2="130"/>
    <rect x="495" y="125" width="10" height="10" fill="#00ff88"/>
    <line x1="500" y1="125" x2="500" y2="135"/>
    
    <line x1="600" y1="80" x2="600" y2="90"/>
    <rect x="595" y="85" width="10" height="10" fill="#00ff88"/>
    <line x1="600" y1="85" x2="600" y2="95"/>
    
    <line x1="700" y1="40" x2="700" y2="50"/>
    <rect x="695" y="45" width="10" height="10" fill="#00ff88"/>
    <line x1="700" y1="45" x2="700" y2="55"/>
  </g>
  
  <!-- Labels -->
  <text x="20" y="30" fill="#ffffff" font-family="Arial" font-size="16" font-weight="bold">BTC/USDT</text>
  <text x="20" y="50" fill="#888888" font-family="Arial" font-size="12">H1</text>
  
  <!-- Price labels -->
  <text x="750" y="25" fill="#888888" font-family="Arial" font-size="10">$45,000</text>
  <text x="750" y="85" fill="#888888" font-family="Arial" font-size="10">$44,000</text>
  <text x="750" y="145" fill="#888888" font-family="Arial" font-size="10">$43,000</text>
  <text x="750" y="205" fill="#888888" font-family="Arial" font-size="10">$42,000</text>
  <text x="750" y="265" fill="#888888" font-family="Arial" font-size="10">$41,000</text>
  <text x="750" y="325" fill="#888888" font-family="Arial" font-size="10">$40,000</text>
  
  <!-- Time labels -->
  <text x="50" y="390" fill="#888888" font-family="Arial" font-size="10">09:00</text>
  <text x="210" y="390" fill="#888888" font-family="Arial" font-size="10">10:00</text>
  <text x="370" y="390" fill="#888888" font-family="Arial" font-size="10">11:00</text>
  <text x="530" y="390" fill="#888888" font-family="Arial" font-size="10">12:00</text>
  <text x="690" y="390" fill="#888888" font-family="Arial" font-size="10">13:00</text>
  
  <!-- Trend indicator -->
  <text x="650" y="30" fill="#00ff88" font-family="Arial" font-size="14" font-weight="bold">↗ BULLISH</text>
</svg>